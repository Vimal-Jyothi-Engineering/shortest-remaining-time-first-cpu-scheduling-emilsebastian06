name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Test 1
      id: test-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 1
        setup-command: ''
        command: make test
        input: |-
          5
          P1 2 6
          P2 5 2
          P3 1 8
          P4 0 3
          P5 4 4
        expected-output: |-
          Waiting Time:
          P1 7
          P2 0
          P3 14
          P4 0
          P5 2
          Turnaround Time:
          P1 13
          P2 2
          P3 22
          P4 3
          P5 6
          Average Waiting Time: 4.6
          Average Turnaround Time: 9.2
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 2
      id: test-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 2
        setup-command: ''
        command: make test
        input: |-
          3
          P1 0 5
          P2 1 3
          P3 2 2
        expected-output: |-
          Waiting Time:
          P1 5
          P2 0
          P3 2
          Turnaround Time:
          P1 10
          P2 3
          P3 4
          Average Waiting Time: 2.3
          Average Turnaround Time: 5.7
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST-1_RESULTS: "${{steps.test-1.outputs.result}}"
        TEST-2_RESULTS: "${{steps.test-2.outputs.result}}"
      with:
        runners: test-1,test-2
